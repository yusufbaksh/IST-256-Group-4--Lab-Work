<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Product Management</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>

<body class="container mt-4">

<!-- Person 1: Liya Aji - Search -->

<h2>Product Management</h2>

<h4>Search Product</h4>
<input type="text" id="searchId" placeholder="Enter Product ID">
<button id="searchBtn">Search</button>

<hr>

<!-- Author: Yusuf Baksh -->
<!-- Person 2: Save / JSON -->

<h4>Add Product</h4>

<input type="text" id="productId" placeholder="Product ID"><br><br>
<input type="text" id="productDescription" placeholder="Description"><br><br>

<select id="productCategory">
  <option value="">Select Category</option>
  <option>Engine</option>
  <option>Suspension</option>
  <option>Exhaust</option>
</select><br><br>

<select id="unitMeasure">
  <option value="">Select Unit</option>
  <option>Each</option>
  <option>Box</option>
</select><br><br>

<input type="text" id="productPrice" placeholder="Price"><br><br>
<input type="text" id="productWeight" placeholder="Weight (optional)"><br><br>

<button id="saveBtn">Save</button>

<hr>

<h4>JSON Output</h4>
<pre id="jsonOutput"></pre>

<script src="product.js"></script>

</body>
</html>
