<h2>Product Management</h2>

<h4>Search Product</h4>
<input type="text" id="searchId" placeholder="Enter Product ID">
<button id="searchBtn">Search</button>

<hr>

<!-- Author: Yusuf Baksh -->
<!-- Person 2: Save / JSON -->

<h4>Add Product</h4>

<input type="text" id="productId" placeholder="Product ID"><br><br>
<input type="text" id="productDescription" placeholder="Description"><br><br>

<select id="productCategory">
  <option value="">Select Category</option>
  <option>Engine</option>
  <option>Suspension</option>
  <option>Exhaust</option>
</select><br><br>

<select id="unitMeasure">
  <option value="">Select Unit</option>
  <option>Each</option>
  <option>Box</option>
</select><br><br>

<input type="text" id="productPrice" placeholder="Price"><br><br>
<input type="text" id="productWeight" placeholder="Weight (optional)"><br><br>

<button id="saveBtn">Save</button>

<hr>
<!-- =====================================================
     Author: Martin 
     Person 3: Update
     Task: Locate product by ID, replace values, refresh JSON
     ===================================================== -->
<h4>Update Product</h4>

<input type="text" id="updateId" placeholder="Product ID to Update"><br><br>
<input type="text" id="updateDescription" placeholder="New Description"><br><br>

<select id="updateCategory">
  <option value="">Select Category</option>
  <option>Engine</option>
  <option>Suspension</option>
  <option>Exhaust</option>
</select><br><br>

<select id="updateUnit">
  <option value="">Select Unit</option>
  <option>Each</option>
  <option>Box</option>
</select><br><br>

<input type="text" id="updatePrice" placeholder="New Price"><br><br>
<input type="text" id="updateWeight" placeholder="New Weight (optional)"><br><br>

<button id="updateBtn">Update</button>
<hr>

<pre id="jsonOutput"></pre>
