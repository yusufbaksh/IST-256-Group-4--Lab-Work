<!DOCTYPE html>
<html lang="en" ng-app="shippingApp">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>YusufSpeedShop | Shipping Selection</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>

<!-- AngularJS -->
<script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>

<style>
  body { padding-top: 80px; }
</style>
</head>

<body ng-controller="ShippingController as shipCtrl">

<!-- HTML contributed by Yusuf -->
<div class="container mt-5">
    <h2>Shipping Selection</h2>

    <form name="shippingForm">
        <div class="mb-3">
    <label for="address">Address:</label>
    <input type="text" id="address" class="form-control" ng-model="shipCtrl.shipping.address" required>
</div>

<div class="row">
    <div class="col-md-6 mb-3">
        <label for="city">City:</label>
        <input type="text" id="city" class="form-control" ng-model="shipCtrl.shipping.city" required>
    </div>
    <div class="col-md-4 mb-3">
        <label for="state">State:</label>
        <input type="text" id="state" class="form-control" ng-model="shipCtrl.shipping.state" required>
    </div>
    <div class="col-md-2 mb-3">
        <label for="zip">ZIP:</label>
        <input type="text" id="zip" class="form-control" ng-model="shipCtrl.shipping.zip" required>
    </div>
</div>

<div class="mb-3">
    <label for="carrier">Shipping Carrier:</label>
    <select id="carrier" class="form-control" ng-model="shipCtrl.shipping.carrier" required>
                <option value="">Select Carrier</option>
                <option>FedEx</option>
                <option>UPS</option>
                <option>DHL</option>
            </select>
        </div>

        <div class="mb-3">
    <label for="method">Shipping Method:</label>
            <select id="method" class="form-control" ng-model="shipCtrl.shipping.method" required>
                <option value="">Select Method</option>
                <option>Overnight</option>
                <option>2nd Day</option>
                <option>Ground</option>
            </select>
        </div>

        <!-- Person 3: Liya Aji -->
      
    <button type="button"
        class="btn btn-primary"
        ng-click="shipCtrl.submitForm()"
        ng-disabled="shippingForm.$invalid">
    Submit
    </button>
      
    </form>

    <!-- JSON Output -->
    <div class="mt-4">
        <h4>Shipping JSON Data:</h4>
      
        <div ng-show="shipCtrl.showJSON">
        <pre>{{ shipCtrl.shippingOutput | json }}</pre>
    </div>
    </div>
</div>

<!-- AngularJS script contributed by Yusuf -->
<script>
    angular.module('shippingApp', [])
        .controller('ShippingController', function() {
            var vm = this;
          
            /*
            Person 3: Liya Aji
            Task: Show JSON + validation + UI control
            */

            vm.shipping = {};
            vm.shippingOutput = {}; 
            vm.showJSON = false;

            vm.submitForm = function() {

              if (vm.shipping.address &&
                  vm.shipping.city &&
                  vm.shipping.state &&
                  vm.shipping.zip &&
                  vm.shipping.carrier &&
                  vm.shipping.method) {
     
                  vm.shippingOutput = {
                    address: vm.shipping.address,
                    city: vm.shipping.city,
                    state: vm.shipping.state,
                    zip: vm.shipping.zip,
                    carrierName: vm.shipping.carrier,
                    shippingMethod: vm.shipping.method
                  };

                  vm.showJSON = true;

              } else {
                  vm.showJSON = false;
                  alert("Please complete all required fields.");
              }
        };
        });
</script>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
