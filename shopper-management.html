<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopper Management</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Person 1: Yusuf Baksh - Form Data Collection -->

  <h2>Shopper Management</h2>

  <form id="shopperForm">
    <label for="shopperEmail">Email *</label>
    <input type="email" id="shopperEmail"><br><br>

    <label for="shopperName">Name *</label>
    <input type="text" id="shopperName"><br><br>

    <label for="shopperPhone">Phone</label>
    <input type="tel" id="shopperPhone"><br><br>

    <label for="shopperAge">Age *</label>
    <input type="number" id="shopperAge"><br><br>

    <label for="shopperAddress">Address *</label>
    <textarea id="shopperAddress"></textarea><br><br>

    <button type="submit">Submit</button>
  </form>

  <h3>Collected Shopper Data</h3>
  <pre id="output"></pre>

  <script src="shopper.js"></script>
</body>
</html>
