<!DOCTYPE html>
<html lang="en" ng-app="returnsApp">
<head>
    <meta charset="UTF-8">
    <title>Handle Returns</title>

    <!-- Member 2: AJAX + AngularJS integration -->
    <!-- Developer: Yusuf -->

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <!-- AngularJS -->
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>

    <!-- Your JS file -->
    <script src="returns_ajax.js"></script>
</head>

<body ng-controller="ReturnsController">

<div class="container mt-4">
    <h2>Product Return Form</h2>

    <form>
        <div class="mb-3">
            <label class="form-label">Order Number</label>
            <input type="text" class="form-control" ng-model="return.orderNumber">
        </div>

        <div class="mb-3">
            <label class="form-label">Reason for Return</label>
            <input type="text" class="form-control" ng-model="return.reason">
        </div>

        <button type="button" class="btn btn-primary" ng-click="submitReturn()">Submit Return</button>
    </form>

    <hr>

    <h4>JSON Returned From Server:</h4>
    <pre>{{ serverResponse | json }}</pre>
</div>

</body>
</html>
