<!DOCTYPE html>
<html lang="en" ng-app="returnsApp">
<head>
    <meta charset="UTF-8">
    <title>Handle Returns</title>

    <!-- Member 2: AJAX + AngularJS integration -->
    <!-- Developer: Yusuf -->

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <!-- AngularJS -->
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>

    <!-- Your JS file -->
    <script src="returns_ajax.js"></script>
</head>

<body ng-controller="ReturnsController">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="index.html">YusufSpeedShop</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav ms-auto">

        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="signup.html">Signup</a></li>
        <li class="nav-item"><a class="nav-link" href="login.html">Login</a></li>

        <li class="nav-item"><a class="nav-link" href="shopper-management.html">Shopper</a></li>
        <li class="nav-item"><a class="nav-link" href="product.html">Products</a></li>
        <li class="nav-item"><a class="nav-link" href="shoppingcart.html">Cart</a></li>

        <li class="nav-item"><a class="nav-link" href="shipping.html">Shipping</a></li>
        <li class="nav-item"><a class="nav-link" href="returns.html">Returns</a></li>
        <li class="nav-item"><a class="nav-link" href="billings.html">Billing</a></li>

      </ul>
    </div>
  </div>
</nav>
    
<div class="container mt-4">
    <h2>Product Return Form</h2>

    <form>
        <div class="mb-3">
            <label class="form-label">Order Number</label>
            <input type="text" class="form-control" ng-model="return.orderNumber">
        </div>

        <div class="mb-3">
            <label class="form-label">Reason for Return</label>
            <input type="text" class="form-control" ng-model="return.reason">
        </div>

        <button type="button" class="btn btn-primary" ng-click="submitReturn()">Submit Return</button>
    </form>

    <hr>

    <h4>JSON Returned From Server:</h4>
    <pre>{{ serverResponse | json }}</pre>
</div>

</body>
</html>
