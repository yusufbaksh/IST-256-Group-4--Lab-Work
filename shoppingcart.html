<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Shopping Cart</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<link rel="stylesheet" href="styles.css">
</head>

<body>

/*
Person 1: Liya Aji
Task: Header & Layout
*/

<header>
  <h1>YusufSpeedShop</h1>
  <p>Shopping Cart</p>
</header>

<div class="container mt-4">


<select id="productSelect" class="form-select mb-3">
  <option value="399.00">Stage 1 Engine Tune - $399.00</option>
  <option value="699.00">Stage 2 Engine Tune - $699.00</option>
  <option value="249.00">Axle-Back Exhaust Install - $249.00</option>
  <option value="449.00">Cat-Back Exhaust Install - $449.00</option>
  <option value="799.00">Custom Exhaust Fabrication - $799.00</option>
  <option value="349.00">Lowering Springs Install - $349.00</option>
  <option value="599.00">Coilovers Install - $599.00</option>
  <option value="129.00">Alignment - $129.00</option>
</select>

  <button id="addBtn" class="btn btn-primary mb-4">Add</button>

 
  <table class="table table-bordered">
    <thead>
      <tr>
        <th>Product Name</th>
        <th>Price</th>
        <th>Quantity</th>
        <th>Total</th>
      </tr>
    </thead>
    <tbody id="cartTable"></tbody>
  </table>

  <h4>Total: $<span id="grandTotal">0.00</span></h4>

  <button id="checkoutBtn" class="btn btn-success mt-3">Checkout</button>
  <button id="clearCartBtn" class="btn btn-warning mt-3 ms-2">Clear Cart</button>

  <hr>

/*
Person 1: Liya Aji
Task: JSON Display/Output
*/

  <h4>JSON Output</h4>
  <pre id="jsonOutput"></pre>

</div>

<footer>
  <p>© 2026 YusufSpeedShop</p>
</footer>

<script src="shoppingcart.js"></script>

</body>
</html>
