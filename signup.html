<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>User Signup | YusufSpeedShop</title>

<!-- Bootstrap CDN -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="styles.css">
</head>

<body class="bg-light">

<div class="container mt-5">
  <div class="card shadow p-4">
    <h2 class="mb-4">User Signup</h2>

    <form onsubmit="return validateForm()">

      <!-- Username -->
      <div class="mb-3">
        <label class="form-label">Username:</label>
        <input type="text" class="form-control" id="username"
               placeholder="Enter username"
               onfocusout="validate(this)">
      </div>

      <!-- Email -->
      <div class="mb-3">
        <label class="form-label">Email:</label>
        <input type="text" class="form-control" id="email"
               placeholder="joe@test.com"
               onfocusout="validate(this)">
      </div>

      <!-- Password -->
      <div class="mb-3">
        <label class="form-label">Password:</label>
        <input type="password" class="form-control" id="password"
               placeholder="Enter password"
               onfocusout="validate(this)">
      </div>

      <!-- Confirm Password -->
      <div class="mb-3">
        <label class="form-label">Confirm Password:</label>
        <input type="password" class="form-control" id="confirmPassword"
               placeholder="Confirm password"
               onfocusout="validate(this)">
      </div>

      <button type="submit" class="btn btn-dark w-100">Sign Up</button>

    </form>
  </div>
</div>

<!-- JavaScript Validation -->
<script>

function validate(obj) {

    // Required field check
    if (obj.value.trim() === "") {
        obj.value = "Field is required";
        obj.style.color = "#FF0000";
        obj.style.borderColor = "red";
        return false;
    }

    // Email format check
    if (obj.id === "email") {
        var emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;
        if (!obj.value.match(emailPattern)) {
            obj.value = "Invalid email format";
            obj.style.color = "#FF0000";
            obj.style.borderColor = "red";
            return false;
        }
    }

    // Password match check
    if (obj.id === "confirmPassword") {
        var password = document.getElementById("password").value;
        if (obj.value !== password) {
            obj.value = "Passwords do not match";
            obj.style.color = "#FF0000";
            obj.style.borderColor = "red";
            return false;
        }
    }

    // Reset styling if valid
    obj.style.color = "#000000";
    obj.style.borderColor = "#ced4da";
    return true;
}


function validateForm() {

    var fields = ["username", "email", "password", "confirmPassword"];
    var valid = true;

    for (var i = 0; i < fields.length; i++) {
        var field = document.getElementById(fields[i]);
        if (!validate(field)) {
            valid = false;
        }
    }

    return valid; // prevents submit if false
}

</script>

</body>
</html>
